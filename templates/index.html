<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Object Classifier</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARD */
.main-box{
    background:#fff;
    padding:30px;
    border-radius:20px;
    width:800px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:20px;
}
.title h2{
    color:#1e3c72;
    font-weight:600;
}
.title p{
    color:#777;
}

/* IMAGE BOX */
.image-part{
    height:300px;
    width:300px;
    border:2px dashed #ccc;
    border-radius:15px;
    margin:auto;
    overflow:hidden;
    background:#f9f9f9;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.image-part span{
    color:#aaa;
}

.image-part img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

#video{
    width:100%;
    height:100%;
}

/* BUTTONS */
.btn{
    border-radius:10px !important;
    font-weight:500;
}

.btn-primary{
    background:#6c63ff;
    border:none;
}
.btn-primary:hover{
    background:#574fd6;
}

.btn-success{
    background:#28a745;
    border:none;
}
.btn-success:hover{
    background:#218838;
}

/* RESULT */
.result-box{
    background:#f7f9fc;
    border-radius:15px;
    padding:15px;
}

.res-part{
    background:#fff;
    border-radius:10px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    min-height:150px;
}

/* LOADER */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.6);
    display:none;
    top:0;
    left:0;
}

.loader{
    border:6px solid #f3f3f3;
    border-top:6px solid #6c63ff;
    border-radius:50%;
    width:60px;
    height:60px;
    position:absolute;
    top:50%;
    left:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="main-box">

    <div class="title">
        <h2>AI Object Classifier</h2>
        <p>Upload an image and get instant prediction</p>
    </div>

    <div class="row">
        <!-- LEFT -->
        <div class="col-md-6 text-center">

            <div class="image-part">
                <span id="placeholder">Upload Image</span>
                <video autoplay id="video"></video>
                <img id="photo">
                <canvas id="canvas" style="display:none;"></canvas>
            </div>

            <input type="file" id="fileinput" hidden>

            <div class="mt-3">
                <button class="btn btn-primary" id="uload">Upload</button>
                <button class="btn btn-success" id="send" disabled>Predict</button>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="col-md-6">
            <div class="result-box">
                <h5 class="text-center mb-3">Prediction Result</h5>
                <div class="res-part" id="result">
                    Waiting for prediction...
                </div>
            </div>
        </div>
    </div>

</div>

<div id="loading"><div class="loader"></div></div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

<script>
var base_data = "";

// Upload click
$('#uload').click(function(){
    $('#fileinput').click();
});

// File change
$("#fileinput").change(function(){
    if(this.files && this.files[0]){
        var reader = new FileReader();

        reader.onload = function(e){
            var img = new Image();

            img.onload = function(){
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');

                canvas.height = this.height;
                canvas.width = this.width;

                ctx.drawImage(this, 0, 0);

                base_data = canvas.toDataURL('image/jpeg').split(',')[1];

                $('#send').prop('disabled', false);
            };

            img.src = e.target.result;

            $('#photo').attr('src', e.target.result).show();
            $('#video').hide();
            $('#placeholder').hide();
        };

        reader.readAsDataURL(this.files[0]);
    }
});

// Predict click
$('#send').click(function(){

    if(!base_data){
        alert("Upload image first");
        return;
    }

    $("#loading").show();

    $.ajax({
        url:"/predict",
        type:"POST",
        contentType:"application/json",
        data:JSON.stringify({image:base_data}),

        success:function(res){
            let output = "Prediction failed";

            if(res && res.length > 0){
                output = res[0].image;
            }

            $("#result").html("<h4>"+output+"</h4>");
            $("#loading").hide();
        },

        error:function(){
            $("#result").html("<h5>Server Error</h5>");
            $("#loading").hide();
        }
    });

});
</script>

</body>
</html>
